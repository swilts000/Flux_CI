apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: todo-api
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: todo-api
  namespaceSelector:
    matchNames:
      - testswilts
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
