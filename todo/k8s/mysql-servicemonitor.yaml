apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mysql
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: mysql
  namespaceSelector:
    matchNames:
      - testswilts
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
