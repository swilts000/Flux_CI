---
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: todo-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: todo-api
  minReplicas: 1
  maxReplicas: 5
  # autoscaling/v1 uses targetCPUUtilizationPercentage
  targetCPUUtilizationPercentage: 50
