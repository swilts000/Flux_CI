apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: todo-app
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./todo/k8s
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: default
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: todo-api
      namespace: default
    - apiVersion: apps/v1
      kind: Deployment
      name: todo-frontend
      namespace: default
    - apiVersion: apps/v1
      kind: Deployment
      name: mysql
      namespace: default
